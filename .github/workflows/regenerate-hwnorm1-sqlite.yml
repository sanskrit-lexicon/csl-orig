name: Regenerate hwnorm1.sqlite

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout csl-pywork
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/csl-pywork
          path: sanskrit-lexicon/csl-pywork
          fetch-depth: 1

      - name: Checkout csl-orig
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/csl-orig
          path: sanskrit-lexicon/csl-orig
          fetch-depth: 1

      - name: Checkout csl-websanlexicon
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/csl-websanlexicon
          path: sanskrit-lexicon/csl-websanlexicon
          fetch-depth: 1

      - name: Checkout hwnorm1
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/hwnorm1
          path: sanskrit-lexicon/hwnorm1
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout csl-lslink
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/csl-lslink
          path: sanskrit-lexicon/csl-lslink
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout hwnorm2
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/hwnorm2
          path: sanskrit-lexicon/hwnorm2
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout csl-apidev
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/csl-apidev
          path: sanskrit-lexicon/csl-apidev
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install mako lxml indic-transliteration
          sudo apt-get update && sudo apt-get install -y libxml2-utils sqlite3 unzip gh

      - name: Fetch data of PD dictionary
        run: |
          mkdir -p sanskrit-lexicon/pd/orig
          mkdir -p sanskrit-lexicon/pd/pywork/hwextra
          
          ( cd sanskrit-lexicon/pd/orig
            curl -L -o pdtxt.zip https://www.sanskrit-lexicon.uni-koeln.de/scans/PDScan/2020/downloads/pdtxt.zip
            unzip -o pdtxt.zip
            mv txt/* . 2>/dev/null || true
            rm -rf txt pdtxt.zip
          )
          
          touch sanskrit-lexicon/pd/pywork/hwextra/pd_hwextra.txt

      - name: Run redo_xampp_all.sh
        run: |
          cd sanskrit-lexicon/csl-pywork/v02
          sh redo_xampp_all.sh

      - name: Run hwnorm1 sanhw1 redo.sh
        run: |
          cd sanskrit-lexicon/hwnorm1/sanhw1
          sh redo.sh

      - name: Configure git for hwnorm1
        run: |
          cd sanskrit-lexicon/hwnorm1
          git config user.name "HWNORM1 BOT"
          git config user.email "actions@github.com"

      - name: Commit and push hwnorm1 changes
        run: |
          cd sanskrit-lexicon/hwnorm1
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          if git diff --quiet; then
            echo "No changes to commit in hwnorm1"
            echo "No Change In Headword. Not Required To Do Anything Further"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git add -A
            git commit -m "Regenerated hwnorm1.sqlite as on $TIMESTAMP"
            git push
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Check for changes
        if: env.HAS_CHANGES == 'true'
        run: echo "Changes detected in sanhw1.txt - continuing with hwnorm2, csl-apidev and csl-sqlite"

      - name: Run hwnorm2 redo scripts
        if: env.HAS_CHANGES == 'true'
        run: |
          cd sanskrit-lexicon/hwnorm2/keydoc/distincthws
          sh redo.sh
          cd ../..
          sh redo.sh xampp

      - name: Configure git for hwnorm2
        if: env.HAS_CHANGES == 'true'
        run: |
          cd sanskrit-lexicon/hwnorm2
          git config user.name "HWNORM1 BOT"
          git config user.email "actions@github.com"

      - name: Commit and push hwnorm2 changes
        if: env.HAS_CHANGES == 'true'
        run: |
          cd sanskrit-lexicon/hwnorm2
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          if git diff --quiet; then
            echo "No changes to commit in hwnorm2"
          else
            git add -A
            git commit -m "Regenerated hwnorm2 repo as on $TIMESTAMP"
            git push
          fi

      - name: Copy sqlite files for release
        if: env.HAS_CHANGES == 'true'
        run: |
          mkdir -p /tmp/csl-sqlite
          cp sanskrit-lexicon/hwnorm1/sanhw1/hwnorm1c.sqlite /tmp/csl-sqlite/
          cp sanskrit-lexicon/hwnorm2/keydoc/keydoc_glob1.sqlite /tmp/csl-sqlite/

      - name: Move hwnorm1c.sqlite to csl-apidev
        if: env.HAS_CHANGES == 'true'
        run: |
          mkdir -p sanskrit-lexicon/csl-apidev/simple-search/hwnorm1
          mv sanskrit-lexicon/hwnorm1/sanhw1/hwnorm1c.sqlite sanskrit-lexicon/csl-apidev/simple-search/hwnorm1/

      - name: Configure git for csl-apidev
        if: env.HAS_CHANGES == 'true'
        run: |
          cd sanskrit-lexicon/csl-apidev
          git config user.name "HWNORM1 BOT"
          git config user.email "actions@github.com"

      - name: Commit and push csl-apidev changes
        if: env.HAS_CHANGES == 'true'
        run: |
          cd sanskrit-lexicon/csl-apidev
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          if git diff --quiet; then
            echo "No changes to commit in csl-apidev"
          else
            git add -A
            git commit -m "Regenerated hwnorm1.sqlite as on $TIMESTAMP"
            git push
          fi

      - name: Create zip files for release
        if: env.HAS_CHANGES == 'true'
        run: |
          mkdir -p /tmp/csl-sqlite
          cd /tmp/csl-sqlite
          zip hwnorm1c.sqlite.zip hwnorm1c.sqlite
          zip keydoc_glob1.sqlite.zip keydoc_glob1.sqlite

          # All dictionary codes except 'pd' (excluded due to copyright)
          DICTCODES="acc ae ap90 ap ben bhs bop bor bur cae ccs gra gst ieg inm krm mci md mw mw72 mwe pe pgn pui pw pwg sch shs skd snp stc vcp vei wil yat lan armh pwkvn lrv abch acph acsj fri"

          for DICTCODE in $DICTCODES; do
            SQLITE_DIR="$GITHUB_WORKSPACE/sanskrit-lexicon/${DICTCODE}/web/sqlite"
            if [ -d "$SQLITE_DIR" ] && [ -n "$(ls -A "$SQLITE_DIR" 2>/dev/null)" ]; then
              zip -j "${DICTCODE}.zip" "${SQLITE_DIR}"/*
              echo "Created ${DICTCODE}.zip"
            else
              echo "Skipping ${DICTCODE}: no sqlite files found at ${SQLITE_DIR}"
            fi
          done

      - name: Create LS links zip files
        run: |
          mkdir -p /tmp/csl-sqlite-lslinks
          cd /tmp/csl-sqlite-lslinks
          
          # Copy LS links sqlite files from csl-lslink/zip
          LSLINK_DIR="$GITHUB_WORKSPACE/sanskrit-lexicon/csl-lslink/zip"
          if [ -d "$LSLINK_DIR" ] && [ -n "$(ls -A "$LSLINK_DIR" 2>/dev/null)" ]; then
            for f in "$LSLINK_DIR"/*_lslinks.sqlite.zip; do
              if [ -f "$f" ]; then
                # Rename: pwg_lslinks.sqlite.zip -> pwg_lslinks.sqlite.zip (keep as is since already named correctly)
                # Files are already named like pwg_lslinks.sqlite.zip
                cp "$f" .
                echo "Copied $(basename "$f")"
              fi
            done
          else
            echo "No LS links files found at ${LSLINK_DIR}"
          fi

      - name: Create Release with Assets
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          DATE_TAG=$(date +%Y-%m-%d-%H-%M-%S)

          # Collect all zip files from /tmp/csl-sqlite (dictionary zips)
          DICT_ASSETS=$(ls /tmp/csl-sqlite/*.zip 2>/dev/null | tr '\n' ' ')

          # Collect LS links zip files
          LSLINKS_ASSETS=""
          if [ -d "/tmp/csl-sqlite-lslinks" ] && [ -n "$(ls -A '/tmp/csl-sqlite-lslinks' 2>/dev/null)" ]; then
            LSLINKS_ASSETS=$(ls /tmp/csl-sqlite-lslinks/*.zip 2>/dev/null | tr '\n' ' ')
          fi

          # Combine both asset lists
          ALL_ASSETS="$DICT_ASSETS $LSLINKS_ASSETS"

          gh release create "$DATE_TAG" --title "Release $DATE_TAG" --draft=false --prerelease=false \
            -R sanskrit-lexicon/csl-sqlite \
            $ALL_ASSETS

      - name: Publish ZIPs to csl-sqlite gh-pages
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Strategy: force-orphan push — the gh-pages branch always has exactly
          # ONE commit in history, no matter how many times this workflow runs.
          # This keeps the csl-sqlite repo history clean (same approach as
          # peaceiris/actions-gh-pages with force_orphan: true).

          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/sanskrit-lexicon/csl-sqlite.git"
          WORK_DIR="/tmp/csl-sqlite-pages"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"

          # Initialise a throw-away local repo (no history needed)
          git init
          git config user.name "HWNORM1 BOT"
          git config user.email "actions@github.com"
          git remote add origin "$REMOTE"

          # Copy all generated ZIPs into the working directory
          cp /tmp/csl-sqlite/*.zip .

          # Copy LS links ZIPs (pwg_lslinks, pw_lslinks, mw_lslinks, gra_lslinks, sch_lslinks)
          if [ -d "/tmp/csl-sqlite-lslinks" ]; then
            cp /tmp/csl-sqlite-lslinks/*.zip .
          fi

          # Add a minimal index.html so GitHub Pages activates on this branch
          echo "Sanskrit Lexicon SQLite dictionaries" > index.html

          # Stage everything and create a single root commit (no parent → orphan)
          git add .
          git commit -m "SQLite ZIPs as on $TIMESTAMP"

          # Force-push as gh-pages — replaces any prior history with this one commit
          git push --force origin HEAD:gh-pages
          echo "✓ Pushed ZIPs to https://sanskrit-lexicon.github.io/csl-sqlite/ (single-commit history)"