name: Generate and Sync Stardict Files

# Trigger the workflow on pushes to the master branch
on:
  push:
    branches:
      - master
    paths:
      - 'v02/**'
      - '.github/workflows/update-stardict.yml'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the trigger repository (csl-orig)
      - name: Checkout csl-orig
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/csl-orig
          path: sanskrit-lexicon/csl-orig
          fetch-depth: 2 # Fetch 2 to allow changed-files to compare with previous commit

      # 2. Detect changed files in csl-orig early
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          path: sanskrit-lexicon/csl-orig
          files: |
            v02/**

      # 3. Checkout the scripts repository (cologne-stardict)
      - name: Checkout cologne-stardict
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/cologne-stardict
          path: sanskrit-lexicon/cologne-stardict
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      # 4. Checkout the target repository (stardict-sanskrit)
      - name: Checkout stardict-sanskrit
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: indic-dict/stardict-sanskrit
          path: indic-dict/stardict-sanskrit
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1
          
      # 5. Checkout hwnorm1 repository
      - name: Checkout hwnorm1
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/hwnorm1
          path: sanskrit-lexicon/hwnorm1
          fetch-depth: 1

      # Configure Git Globally for the runner
      - name: Configure Git
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          git config --global user.name "drdhaval2785"
          git config --global user.email "drdhaval2785gmail.com"

      # Install Python dependencies
      - name: Install dependencies
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          pip install indic-transliteration

      # 6. Run the transformation scripts for changed dictionaries
      - name: Run transformation scripts
        if: steps.changed-files.outputs.any_changed == 'true'
        working-directory: sanskrit-lexicon/cologne-stardict
        run: |
          # Create input directory if not exists
          mkdir -p input
          # Copy hwnorm1c.txt
          cp ../hwnorm1/sanhw1/hwnorm1c.txt input/hwnorm1c.txt
          
          # Extract unique dictionary codes (XXX) from changed v02/XXX/ files
          CHANGED_DICTS=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '^v02/' | awk -F'/' '{print $2}' | sort -u)
          
          if [ -z "$CHANGED_DICTS" ]; then
            echo "No changes in v02/ folders. Skipping transformation."
          else
            for dict in $CHANGED_DICTS; do
              echo "Processing dictionary: $dict"
              if [[ " abch acph acsj " =~ " $dict " ]]; then
                python3 make_babylon_synonymic.py $dict 0
                python3 make_babylon_synonymic.py $dict 1
              else
                python3 make_babylon.py $dict 0
                python3 make_babylon.py $dict 1
              fi
            done
            # Sync to stardict-sanskrit repository
            bash move_to_stardict.sh
          fi

      # 7. Commit and push to cologne-stardict
      - name: Commit and push cologne-stardict
        if: steps.changed-files.outputs.any_changed == 'true'
        working-directory: sanskrit-lexicon/cologne-stardict
        run: |
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Regeneration after csl-orig commit ${{ github.sha }}"
            git push origin master
          else
            echo "No changes found in cologne-stardict. Skipping commit."
          fi

      # 8. Commit and push to stardict-sanskrit
      - name: Commit and push stardict-sanskrit
        if: steps.changed-files.outputs.any_changed == 'true'
        working-directory: indic-dict/stardict-sanskrit
        run: |
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Regeneration after csl-orig commit ${{ github.sha }}"
            git push origin master
          else
            echo "No changes found in stardict-sanskrit. Skipping commit."
          fi
