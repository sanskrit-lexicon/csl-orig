name: Generate and Sync Stardict Files

# Trigger the workflow on pushes to the master branch
on:
  push:
    branches:
      - master

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the trigger repository (csl-orig)
      - name: Checkout csl-orig
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/csl-orig
          path: sanskrit-lexicon/csl-orig
          fetch-depth: 1

      # 2. Checkout the scripts repository (cologne-stardict)
      - name: Checkout cologne-stardict
        uses: actions/checkout@v4
        with:
          repository: sanskrit-lexicon/cologne-stardict
          path: sanskrit-lexicon/cologne-stardict
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      # 3. Checkout the target repository (stardict-sanskrit)
      - name: Checkout stardict-sanskrit
        uses: actions/checkout@v4
        with:
          repository: indic-dict/stardict-sanskrit
          path: indic-dict/stardict-sanskrit
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1
          
      # Configure Git Globally for the runner
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 4. Run the bash scripts
      - name: Run transformation scripts
        working-directory: sanskrit-lexicon/cologne-stardict
        run: |
          bash redo.sh 0
          bash redo.sh 1
          bash move_to_stardict.sh

      # 5. Commit and push to cologne-stardict
      - name: Commit and push cologne-stardict
        working-directory: sanskrit-lexicon/cologne-stardict
        run: |
          git add .
          if ! git diff-index --quiet HEAD; then
            # ${{ github.sha }} will be replaced by the ACTUAL commit number from csl-orig 
            git commit -m "Regeneration after csl-orig commit ${{ github.sha }}"
            git push origin master
          else
            echo "No changes found in cologne-stardict. Skipping commit."
          fi

      # 6. Commit and push to stardict-sanskrit
      - name: Commit and push stardict-sanskrit
        working-directory: indic-dict/stardict-sanskrit
        run: |
          git add .
          if ! git diff-index --quiet HEAD; then
            # ${{ github.sha }} will be replaced by the ACTUAL commit number from csl-orig 
            git commit -m "Regeneration after csl-orig commit ${{ github.sha }}"
            git push origin master
          else
            echo "No changes found in stardict-sanskrit. Skipping commit."
          fi
